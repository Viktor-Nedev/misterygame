<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maki Tilemap Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #1a1a2e; color: #ddd; font-family: monospace; font-size: 13px; }

#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
  height: 40px;
}
button {
  background: #0f3460;
  color: #ddd;
  border: 1px solid #2a4a7f;
  padding: 4px 10px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
  white-space: nowrap;
}
button:hover { background: #1a4a8f; }
button.active { background: #533483; border-color: #8a5aff; color: #fff; }
button.erase-sub { font-size: 11px; padding: 3px 7px; background: #1a2a3a; border-color: #2a4a7f; }
button.erase-sub.active { background: #7a3010; border-color: #d06020; color: #ffd; }
#erase-targets { display: none; align-items: center; gap: 3px; }
.sep { width: 1px; height: 24px; background: #2a4a7f; margin: 0 2px; flex-shrink: 0; }
#status { margin-left: 8px; font-size: 11px; color: #888; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#export-btn { margin-left: auto; background: #1a6040; border-color: #2a9060; }
#export-btn:hover { background: #2a8050; }

#layout {
  display: flex;
  height: calc(100vh - 40px);
  overflow: hidden;
}

/* Left panel */
#tileset-panel {
  min-width: 200px;
  background: #12192e;
  border-right: 1px solid #0f3460;
  overflow-y: auto;
  overflow-x: auto;
  flex-shrink: 0;
}
#tileset-panel h3 {
  font-size: 11px;
  color: #888;
  padding: 6px 8px 4px;
  border-bottom: 1px solid #0f3460;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#tileset-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px;
  border-top: 1px solid #0f3460;
}
.tileset-card {
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 3px;
  background: #1a2a4a;
  padding: 2px;
  width: 56px;
  box-sizing: border-box;
}
.tileset-card:hover { background: #223355; }
.tileset-card.selected { border-color: #4fc3f7; }
.tileset-card img {
  display: block;
  width: 100%;
  image-rendering: pixelated;
}
.tileset-card-label {
  font-family: monospace;
  font-size: 9px;
  color: #aaa;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 1px 0;
}
#tileset-canvas {
  display: block;
  cursor: pointer;
  image-rendering: pixelated;
}
#furniture-section {
  border-top: 1px solid #0f3460;
}
#furniture-section h3 {
  font-size: 11px;
  color: #888;
  padding: 6px 8px 4px;
  border-bottom: 1px solid #0f3460;
  text-transform: uppercase;
  letter-spacing: 1px;
}
#furniture-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px;
}
.asset-thumb.selected { border-color: #f7a14f; }

/* Right panel */
#map-panel {
  flex: 1;
  overflow: auto;
  background: #0a0a1a;
  padding: 16px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
#map-canvas {
  display: block;
  cursor: crosshair;
  image-rendering: pixelated;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-paint" class="active" onclick="setMode('paint')">Paint</button>
  <button id="btn-erase" onclick="setMode('erase')">Erase</button>
  <span id="erase-targets">
    <button id="btn-erase-floor"     class="erase-sub active" onclick="toggleEraseTarget('floor')">Floor</button>
    <button id="btn-erase-furniture" class="erase-sub active" onclick="toggleEraseTarget('furniture')">Furniture</button>
    <button id="btn-erase-collision" class="erase-sub active" onclick="toggleEraseTarget('collision')">Collision</button>
  </span>
  <button id="btn-collision" onclick="setMode('collision')">Collision</button>
  <button id="btn-fill" onclick="setMode('fill')">Fill</button>
  <button id="btn-object" onclick="setMode('object')">Object</button>
  <div class="sep"></div>
  <button onclick="undo()">Undo</button>
  <button id="btn-grid" class="active" onclick="toggleGrid()">Grid</button>
  <div class="sep"></div>
  <button id="btn-zoom1" onclick="setZoom(1)">1×</button>
  <button id="btn-zoom2" onclick="setZoom(2)">2×</button>
  <button id="btn-zoom3" onclick="setZoom(3)">3×</button>
  <span id="status"></span>
  <button id="export-btn" onclick="exportMap()">Export</button>
</div>

<div id="layout">
  <div id="tileset-panel">
    <h3>Tileset</h3>
    <canvas id="tileset-canvas"></canvas>
    <div id="tileset-picker"></div>
    <div id="furniture-section">
      <h3>Furniture</h3>
      <div id="furniture-picker"></div>
    </div>
  </div>
  <div id="map-panel">
    <canvas id="map-canvas"></canvas>
  </div>
</div>

<script>
// ── Config from URL params ──────────────────────────────────────────────────
const p = new URLSearchParams(location.search)
let currentTileset = p.get('tileset') || 'assets/rooms/room1.png'
const tileSize     = parseInt(p.get('tileSize'))   || 16
const mapWidth     = parseInt(p.get('mapWidth'))   || 16
const mapHeight    = parseInt(p.get('mapHeight'))  || 16
const mapName      = p.get('mapName')     || 'default'
const loadExisting = p.get('loadExisting') === '1'
const startMode    = p.get('mode')        || 'paint'

// ── State ───────────────────────────────────────────────────────────────────
// Selection on the tileset panel — col/row are 0-indexed tile coords
let sel              = { col: 0, row: 0, w: 1, h: 1 }
let selStart         = null   // anchor tile when dragging on the tileset
let tilesetSelecting = false
let mode         = 'paint'
let showGrid     = true
let zoom         = 1
let isMouseDown  = false
let undoPushedThisDrag = false
let eraseTargets = { floor: true, furniture: true, collision: true }
let tilesetImg   = null
let tilesetCols  = 0
let tilesetRows  = 0
let tilesetCanvasW = 0
let tilesetCanvasH = 0

let gameWidth  = 800
let gameHeight = 600

let floorLayer       = Array.from({ length: mapHeight }, () => new Array(mapWidth).fill(0))
let collisionLayer   = Array.from({ length: mapHeight }, () => new Array(mapWidth).fill(false))
const undoStack      = []
let objectsLayer     = []
let selectedAsset    = null
const assetImages    = {}
let collisionAnchor   = null   // { row, col } where collision drag started
let collisionDragEnd  = null   // { row, col } current drag endpoint
let collisionSnapshot = null   // ImageData snapshot taken at drag start

const tilesetCanvas = document.getElementById('tileset-canvas')
const tilesetCtx    = tilesetCanvas.getContext('2d')
const mapCanvas     = document.getElementById('map-canvas')
const mapCtx        = mapCanvas.getContext('2d')

const TS_ZOOM = 2   // tileset panel display zoom

// ── Mode ────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m
  ;['paint','erase','collision','fill','object'].forEach(id => {
    document.getElementById('btn-' + id).classList.toggle('active', id === m)
  })
  document.getElementById('erase-targets').style.display = m === 'erase' ? 'flex' : 'none'
  if (m !== 'object') renderTilesetCanvas()
}

function toggleEraseTarget(t) {
  eraseTargets[t] = !eraseTargets[t]
  document.getElementById('btn-erase-' + t).classList.toggle('active', eraseTargets[t])
}

// ── Grid toggle ─────────────────────────────────────────────────────────────
function toggleGrid() {
  showGrid = !showGrid
  document.getElementById('btn-grid').classList.toggle('active', showGrid)
  renderMap()
}

// ── Zoom (canvas-level — tiles are drawn at zoom×tileSize pixels) ───────────
function setZoom(z) {
  zoom = z
  ;[1,2,3].forEach(n => document.getElementById('btn-zoom' + n).classList.toggle('active', n === z))
  renderMap()
}

// ── Status bar ───────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg
}

// ── Tileset loading ──────────────────────────────────────────────────────────
async function loadTileset(path) {
  if (path) currentTileset = path
  const url = '/' + currentTileset.replace(/^\//, '') + '?t=' + Date.now()
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.onload = () => {
      tilesetImg  = img
      tilesetCols = Math.floor(img.naturalWidth  / tileSize)
      tilesetRows = Math.floor(img.naturalHeight / tileSize)
      renderTilesetCanvas()
      resolve()
    }
    img.onerror = (e) => {
      console.error('[loadTileset] error loading', url, e)
      reject(new Error('Failed to load: ' + currentTileset))
    }
    img.src = url
  })
}

function updateTilesetSelection(path) {
  document.querySelectorAll('.tileset-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.path === path)
  })
}

async function switchTileset(path) {
  if (!path) return
  sel = { col: 0, row: 0, w: 1, h: 1 }
  selStart = null
  currentTileset = path
  updateTilesetSelection(path)
  try {
    await loadTileset(path)
    setStatus(`Tileset: ${path.replace(/^assets\//, '')}`)
  } catch {
    setStatus(`Could not load tileset: ${path}`)
  }
}

async function loadTilesetList() {
  const picker = document.getElementById('tileset-picker')
  try {
    const resp  = await fetch('/list-tilesets')
    const { files } = await resp.json()

    // Measure all room tilesets to find the largest canvas dimensions
    const roomFiles = files.filter(f => f.startsWith('assets/rooms/'))
    const dims = await Promise.all(roomFiles.map(f => new Promise(res => {
      const img = new Image()
      img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight })
      img.onerror = () => res({ w: 0, h: 0 })
      img.src = '/' + f
    })))
    tilesetCanvasW = Math.max(...dims.map(d => d.w)) * TS_ZOOM
    tilesetCanvasH = Math.max(...dims.map(d => d.h)) * TS_ZOOM
    document.getElementById('tileset-panel').style.width = tilesetCanvasW + 'px'

    const roomTilesets = files.filter(f => f.startsWith('assets/rooms/'))
    picker.innerHTML = ''
    for (const f of roomTilesets) {
      const card = document.createElement('div')
      card.className = 'tileset-card'
      card.dataset.path = f
      if (f === currentTileset) card.classList.add('selected')
      const img = document.createElement('img')
      img.src = '/' + f
      const label = document.createElement('div')
      label.className = 'tileset-card-label'
      label.textContent = f.replace(/^assets\/rooms\//, '').replace(/\.[^.]+$/, '')
      card.appendChild(img)
      card.appendChild(label)
      card.addEventListener('click', () => switchTileset(f))
      picker.appendChild(card)
    }
    const hasSelected = roomTilesets.includes(currentTileset)
    if (!hasSelected && roomTilesets.length) await switchTileset(roomTilesets[0])
    else updateTilesetSelection(currentTileset)
  } catch (err) {
    console.error('[loadTilesetList] failed:', err)
  }
}

// ── Tileset panel rendering ──────────────────────────────────────────────────
function renderTilesetCanvas() {
  if (!tilesetImg) return
  const w = tilesetCols * tileSize * TS_ZOOM
  const h = tilesetRows * tileSize * TS_ZOOM
  const cw = tilesetCanvasW || w
  const ch = tilesetCanvasH || h
  tilesetCanvas.width  = cw
  tilesetCanvas.height = ch
  tilesetCtx.imageSmoothingEnabled = false
  tilesetCtx.fillStyle = '#0a0a1a'
  tilesetCtx.fillRect(0, 0, cw, ch)
  tilesetCtx.drawImage(tilesetImg, 0, 0, tilesetImg.width, tilesetImg.height, 0, 0, w, h)

  // Grid
  tilesetCtx.strokeStyle = 'rgba(255,255,255,0.25)'
  tilesetCtx.lineWidth   = 1
  for (let c = 0; c <= tilesetCols; c++) {
    tilesetCtx.beginPath()
    tilesetCtx.moveTo(c * tileSize * TS_ZOOM + 0.5, 0)
    tilesetCtx.lineTo(c * tileSize * TS_ZOOM + 0.5, h)
    tilesetCtx.stroke()
  }
  for (let r = 0; r <= tilesetRows; r++) {
    tilesetCtx.beginPath()
    tilesetCtx.moveTo(0, r * tileSize * TS_ZOOM + 0.5)
    tilesetCtx.lineTo(w, r * tileSize * TS_ZOOM + 0.5)
    tilesetCtx.stroke()
  }

  // Selection highlight
  const sx = sel.col * tileSize * TS_ZOOM
  const sy = sel.row * tileSize * TS_ZOOM
  const sw = sel.w   * tileSize * TS_ZOOM
  const sh = sel.h   * tileSize * TS_ZOOM
  tilesetCtx.fillStyle   = 'rgba(79,195,247,0.18)'
  tilesetCtx.fillRect(sx, sy, sw, sh)
  tilesetCtx.strokeStyle = '#4fc3f7'
  tilesetCtx.lineWidth   = 2
  tilesetCtx.strokeRect(sx + 1, sy + 1, sw - 2, sh - 2)

  // Resize panel to show full tileset width
  // (panel width is fixed to largest room tileset — see loadTilesetList)
}

// ── Object preview on tileset canvas ─────────────────────────────────────────
function renderObjectPreview(src) {
  const img = assetImages[src]
  if (!img) return
  const draw = () => {
    const w = img.naturalWidth  * TS_ZOOM
    const h = img.naturalHeight * TS_ZOOM
    const cw = tilesetCanvasW || w
    const ch = tilesetCanvasH || h
    tilesetCanvas.width  = cw
    tilesetCanvas.height = ch
    tilesetCtx.imageSmoothingEnabled = false
    tilesetCtx.clearRect(0, 0, cw, ch)
    tilesetCtx.fillStyle = '#1a1a2e'
    tilesetCtx.fillRect(0, 0, cw, ch)
    tilesetCtx.drawImage(img, 0, 0, w, h)
    // Orange border to show it's selected
    tilesetCtx.strokeStyle = '#f7a14f'
    tilesetCtx.lineWidth   = 2
    tilesetCtx.strokeRect(1, 1, w - 2, h - 2)
  }
  if (img.complete) draw()
  else img.onload = draw
}

// ── Map canvas rendering ─────────────────────────────────────────────────────
function renderMapCanvas() {
  const zts = tileSize * zoom
  mapCanvas.width  = mapWidth  * zts
  mapCanvas.height = mapHeight * zts

  mapCtx.clearRect(0, 0, mapCanvas.width, mapCanvas.height)
  mapCtx.fillStyle = '#111'
  mapCtx.fillRect(0, 0, mapCanvas.width, mapCanvas.height)

  if (tilesetImg) {
    mapCtx.imageSmoothingEnabled = false
    for (let r = 0; r < mapHeight; r++) {
      for (let c = 0; c < mapWidth; c++) {
        const idx = floorLayer[r][c]
        if (idx > 0) {
          const pos = idx - 1
          const tx  = (pos % tilesetCols) * tileSize
          const ty  = Math.floor(pos / tilesetCols) * tileSize
          mapCtx.drawImage(tilesetImg, tx, ty, tileSize, tileSize,
                           c * zts, r * zts, zts, zts)
        }
      }
    }
  }

  // Collision overlay (always visible)
  for (let r = 0; r < mapHeight; r++) {
    for (let c = 0; c < mapWidth; c++) {
      if (collisionLayer[r][c]) {
        mapCtx.fillStyle = 'rgba(220,40,40,0.38)'
        mapCtx.fillRect(c * zts, r * zts, zts, zts)
      }
    }
  }

  // Object layer
  mapCtx.imageSmoothingEnabled = false
  for (const obj of objectsLayer) {
    const img = assetImages[obj.src]
    if (img && img.complete) mapCtx.drawImage(img, obj.x * zoom, obj.y * zoom, obj.w * zoom, obj.h * zoom)
  }

  // Grid
  if (showGrid) {
    mapCtx.strokeStyle = 'rgba(255,255,255,0.13)'
    mapCtx.lineWidth   = 1
    for (let c = 0; c <= mapWidth; c++) {
      mapCtx.beginPath()
      mapCtx.moveTo(c * zts + 0.5, 0)
      mapCtx.lineTo(c * zts + 0.5, mapCanvas.height)
      mapCtx.stroke()
    }
    for (let r = 0; r <= mapHeight; r++) {
      mapCtx.beginPath()
      mapCtx.moveTo(0, r * zts + 0.5)
      mapCtx.lineTo(mapCanvas.width, r * zts + 0.5)
      mapCtx.stroke()
    }
  }
}

function renderMap() {
  renderMapCanvas()
}

// ── Hit testing ──────────────────────────────────────────────────────────────
function cellFromEvent(e) {
  const rect  = mapCanvas.getBoundingClientRect()
  const scaleX = mapCanvas.width  / rect.width
  const scaleY = mapCanvas.height / rect.height
  const zts = tileSize * zoom
  const col = Math.floor((e.clientX - rect.left) * scaleX / zts)
  const row = Math.floor((e.clientY - rect.top)  * scaleY / zts)
  if (col < 0 || col >= mapWidth || row < 0 || row >= mapHeight) return null
  return { row, col }
}

// ── Undo ─────────────────────────────────────────────────────────────────────
function pushUndo() {
  undoStack.push({
    floor:     floorLayer.map(r => r.slice()),
    collision: collisionLayer.map(r => r.slice()),
    objects:   objectsLayer.map(o => ({ ...o })),
  })
  if (undoStack.length > 64) undoStack.shift()
}

function undo() {
  const snap = undoStack.pop()
  if (!snap) return
  floorLayer     = snap.floor
  collisionLayer = snap.collision
  objectsLayer   = snap.objects
  renderMap()
}

// ── Flood fill ───────────────────────────────────────────────────────────────
function floodFill(startRow, startCol, fromTile, toTile) {
  if (fromTile === toTile) return
  pushUndo()
  const stack = [[startRow, startCol]]
  while (stack.length) {
    const [r, c] = stack.pop()
    if (r < 0 || r >= mapHeight || c < 0 || c >= mapWidth) continue
    if (floorLayer[r][c] !== fromTile) continue
    floorLayer[r][c] = toTile
    stack.push([r-1,c],[r+1,c],[r,c-1],[r,c+1])
  }
}

// ── Collision drag preview (drawn on top of the map canvas) ────────────────
function renderCollisionPreview() {
  if (!collisionAnchor || !collisionDragEnd) return
  const zts = tileSize * zoom
  const r0 = Math.min(collisionAnchor.row, collisionDragEnd.row)
  const c0 = Math.min(collisionAnchor.col, collisionDragEnd.col)
  const r1 = Math.max(collisionAnchor.row, collisionDragEnd.row)
  const c1 = Math.max(collisionAnchor.col, collisionDragEnd.col)
  mapCtx.strokeStyle = '#4fc3f7'
  mapCtx.lineWidth   = 2
  mapCtx.setLineDash([3, 3])
  mapCtx.strokeRect(
    c0 * zts + 1, r0 * zts + 1,
    (c1 - c0 + 1) * zts - 2, (r1 - r0 + 1) * zts - 2
  )
  mapCtx.setLineDash([])
}

// ── Multi-tile stamp ─────────────────────────────────────────────────────────
function stampBrush(topRow, topCol) {
  for (let dr = 0; dr < sel.h; dr++) {
    for (let dc = 0; dc < sel.w; dc++) {
      const r = topRow + dr
      const c = topCol + dc
      if (r >= 0 && r < mapHeight && c >= 0 && c < mapWidth) {
        floorLayer[r][c] = (sel.row + dr) * tilesetCols + (sel.col + dc) + 1
      }
    }
  }
}

// ── Incremental single-cell draw (paint only — never clears other cells) ────
function drawCellOnMap(r, c) {
  const zts = tileSize * zoom
  const x   = c * zts
  const y   = r * zts
  mapCtx.fillStyle = '#111'
  mapCtx.fillRect(x, y, zts, zts)
  const idx = floorLayer[r][c]
  if (idx > 0 && tilesetImg && tilesetCols > 0) {
    const pos = idx - 1
    const tx  = (pos % tilesetCols) * tileSize
    const ty  = Math.floor(pos / tilesetCols) * tileSize
    mapCtx.imageSmoothingEnabled = false
    mapCtx.drawImage(tilesetImg, tx, ty, tileSize, tileSize, x, y, zts, zts)
  }
  if (collisionLayer[r][c]) {
    mapCtx.fillStyle = 'rgba(220,40,40,0.38)'
    mapCtx.fillRect(x, y, zts, zts)
  }
  // Draw furniture objects that overlap this cell (so they stay on top of floor)
  const cx0 = c * tileSize, cy0 = r * tileSize
  for (const obj of objectsLayer) {
    if (obj.x < cx0 + tileSize && obj.x + obj.w > cx0 &&
        obj.y < cy0 + tileSize && obj.y + obj.h > cy0) {
      const fimg = assetImages[obj.src]
      if (fimg && fimg.complete)
        mapCtx.drawImage(fimg, obj.x * zoom, obj.y * zoom, obj.w * zoom, obj.h * zoom)
    }
  }
  if (showGrid) {
    mapCtx.strokeStyle = 'rgba(255,255,255,0.13)'
    mapCtx.lineWidth   = 1
    mapCtx.beginPath()
    mapCtx.strokeRect(x + 0.5, y + 0.5, zts, zts)
  }
}

// stamps wallLayer + draws incrementally, no full canvas clear
function stampAndDraw(topRow, topCol) {
  for (let dr = 0; dr < sel.h; dr++) {
    for (let dc = 0; dc < sel.w; dc++) {
      const r = topRow + dr
      const c = topCol + dc
      if (r >= 0 && r < mapHeight && c >= 0 && c < mapWidth) {
        floorLayer[r][c] = (sel.row + dr) * tilesetCols + (sel.col + dc) + 1
        drawCellOnMap(r, c)
      }
    }
  }
}

function removeTopObjectAtCell(row, col) {
  const px = col * tileSize
  const py = row * tileSize
  for (let i = objectsLayer.length - 1; i >= 0; i--) {
    const o = objectsLayer[i]
    if (px >= o.x && px < o.x + o.w && py >= o.y && py < o.y + o.h) {
      objectsLayer.splice(i, 1)
      return true
    }
  }
  return false
}

function clearObjectSelection() {
  selectedAsset = null
  document.querySelectorAll('.asset-thumb').forEach(t => t.classList.remove('selected'))
}

// ── Paint helpers ─────────────────────────────────────────────────────────────
function applyCell(cell, rightClick) {
  if (!cell) return
  const { row, col } = cell

  if (rightClick) {
    if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
    floorLayer[row][col] = 0
    renderMap()
    return
  }

  if (mode === 'paint') {
    if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
    stampAndDraw(row, col)
  } else if (mode === 'erase') {
    if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
    if (eraseTargets.floor)     floorLayer[row][col] = 0
    if (eraseTargets.furniture) removeTopObjectAtCell(row, col)
    if (eraseTargets.collision) collisionLayer[row][col] = false
    drawCellOnMap(row, col)
  } else if (mode === 'collision') {
    // Record anchor on mousedown; rect is applied on mouseup
    if (!undoPushedThisDrag) {
      pushUndo()
      undoPushedThisDrag = true
      collisionAnchor   = { row, col }
      collisionDragEnd  = { row, col }
      collisionSnapshot = mapCtx.getImageData(0, 0, mapCanvas.width, mapCanvas.height)
    }
  } else if (mode === 'fill') {
    // fill with the top-left tile of the selection
    floodFill(row, col, floorLayer[row][col], sel.row * tilesetCols + sel.col + 1)
    renderMap()
  } else if (mode === 'object') {
    if (!rightClick && selectedAsset) {
      if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
      const img = assetImages[selectedAsset.src]
      objectsLayer.push({
        src: selectedAsset.src,
        x:   col * tileSize,
        y:   row * tileSize,
        w:   img ? img.naturalWidth  : tileSize,
        h:   img ? img.naturalHeight : tileSize,
      })
      renderMap()
    } else if (rightClick) {
      if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
      if (removeTopObjectAtCell(row, col)) {
        renderMap()
      }
    }
  }
}

// ── Map canvas events ────────────────────────────────────────────────────────
mapCanvas.addEventListener('mousedown', e => {
  e.preventDefault()
  isMouseDown        = true
  undoPushedThisDrag = false
  applyCell(cellFromEvent(e), e.button === 2)
})

mapCanvas.addEventListener('mousemove', e => {
  const cell = cellFromEvent(e)
  if (cell) {
    const tile = floorLayer[cell.row][cell.col]
    setStatus(`(${cell.col}, ${cell.row})  tile=${tile}  collision=${collisionLayer[cell.row][cell.col]}`)
  }
  if (!isMouseDown) return
  // Drag — paint/erase/collision
  if (e.buttons === 2) {
    if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
    if (cell) {
      floorLayer[cell.row][cell.col] = 0
      if (mode === 'erase' || mode === 'object') removeTopObjectAtCell(cell.row, cell.col)
      renderMap()
    }
  } else if (mode === 'collision') {
    if (cell && collisionAnchor) {
      collisionDragEnd = cell
      if (collisionSnapshot) mapCtx.putImageData(collisionSnapshot, 0, 0)
      renderCollisionPreview()
    }
  } else if (mode === 'paint' || mode === 'erase') {
    if (!undoPushedThisDrag) { pushUndo(); undoPushedThisDrag = true }
    if (cell) {
      if (mode === 'paint') {
        stampAndDraw(cell.row, cell.col)
      } else {
        if (eraseTargets.floor)     floorLayer[cell.row][cell.col] = 0
        if (eraseTargets.furniture) removeTopObjectAtCell(cell.row, cell.col)
        if (eraseTargets.collision) collisionLayer[cell.row][cell.col] = false
        drawCellOnMap(cell.row, cell.col)
      }
    }
  }
})

function applyCollisionRect() {
  if (!collisionAnchor || !collisionDragEnd) return
  const r0 = Math.min(collisionAnchor.row, collisionDragEnd.row)
  const c0 = Math.min(collisionAnchor.col, collisionDragEnd.col)
  const r1 = Math.max(collisionAnchor.row, collisionDragEnd.row)
  const c1 = Math.max(collisionAnchor.col, collisionDragEnd.col)
  const targetValue = !collisionLayer[collisionAnchor.row][collisionAnchor.col]
  // Restore snapshot — tiles are already pixel-perfect in it, no need to redraw them
  if (collisionSnapshot) { mapCtx.putImageData(collisionSnapshot, 0, 0); collisionSnapshot = null }
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      collisionLayer[r][c] = targetValue
  // Draw only the red overlay on top of the restored canvas — never re-draws tiles
  const zts = tileSize * zoom
  for (let r = r0; r <= r1; r++) {
    for (let c = c0; c <= c1; c++) {
      if (collisionLayer[r][c]) {
        mapCtx.fillStyle = 'rgba(220,40,40,0.38)'
        mapCtx.fillRect(c * zts, r * zts, zts, zts)
      }
    }
  }
  collisionAnchor  = null
  collisionDragEnd = null
}

mapCanvas.addEventListener('mouseup', () => {
  if (mode === 'collision') applyCollisionRect()
  isMouseDown = false
})
mapCanvas.addEventListener('mouseleave', () => {
  if (mode === 'collision') applyCollisionRect()
  isMouseDown = false
})
mapCanvas.addEventListener('contextmenu', e => e.preventDefault())

// ── Tileset panel events ─────────────────────────────────────────────────────
function tilesetColRow(e) {
  const rect = tilesetCanvas.getBoundingClientRect()
  return {
    col: Math.floor((e.clientX - rect.left) / (tileSize * TS_ZOOM)),
    row: Math.floor((e.clientY - rect.top)  / (tileSize * TS_ZOOM)),
  }
}

tilesetCanvas.addEventListener('mousedown', e => {
  clearObjectSelection()
  setMode('paint')
  const { col, row } = tilesetColRow(e)
  if (col >= 0 && col < tilesetCols && row >= 0 && row < tilesetRows) {
    selStart = { col, row }
    sel = { col, row, w: 1, h: 1 }
    tilesetSelecting = true
    renderTilesetCanvas()
    setStatus(`tile ${row * tilesetCols + col + 1}`)
  }
})

tilesetCanvas.addEventListener('mousemove', e => {
  const { col, row } = tilesetColRow(e)
  if (col < 0 || col >= tilesetCols || row < 0 || row >= tilesetRows) return
  if (tilesetSelecting && selStart) {
    const c0 = Math.min(selStart.col, col)
    const r0 = Math.min(selStart.row, row)
    const c1 = Math.max(selStart.col, col)
    const r1 = Math.max(selStart.row, row)
    sel = { col: c0, row: r0, w: c1 - c0 + 1, h: r1 - r0 + 1 }
    renderTilesetCanvas()
    setStatus(`Selecting ${sel.w}×${sel.h} tiles`)
  } else {
    setStatus(`tile ${row * tilesetCols + col + 1}`)
  }
})

tilesetCanvas.addEventListener('mouseup', e => {
  if (tilesetSelecting) {
    tilesetSelecting = false
    const label = sel.w === 1 && sel.h === 1
      ? `tile ${sel.row * tilesetCols + sel.col + 1}`
      : `${sel.w}×${sel.h} brush selected`
    setStatus(label)
  }
})

tilesetCanvas.addEventListener('mouseleave', () => { tilesetSelecting = false })

// ── Export ────────────────────────────────────────────────────────────────────
async function exportMap() {
  const collisions = []
  let id = 0
  for (let r = 0; r < mapHeight; r++) {
    for (let c = 0; c < mapWidth; c++) {
      if (collisionLayer[r][c]) {
        collisions.push({ id: id++, x: c * tileSize, y: r * tileSize, w: tileSize, h: tileSize })
      }
    }
  }

  const data = {
    name:      mapName,
    tileset:   currentTileset,
    tileSize,
    mapWidth,
    mapHeight,
    layers:    { floor: floorLayer, furniture: objectsLayer },
    collisions,
  }

  try {
    const resp = await fetch('/write-map', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ mapName, data }),
    })
    const result = await resp.json()
    setStatus(result.ok ? `✓ Saved maps/${mapName}.json` : '✗ Export failed')
  } catch {
    setStatus('✗ Export failed — is the devserver running?')
  }
}

// ── Load existing map ─────────────────────────────────────────────────────────
async function loadMap() {
  try {
    const resp = await fetch(`/maps/${mapName}.json`)
    if (!resp.ok) return
    const data = await resp.json()
    if (data.layers?.floor) floorLayer = data.layers.floor
    else if (data.layers?.wall) floorLayer = data.layers.wall  // backward compat
    if (data.collisions) {
      collisionLayer = Array.from({ length: mapHeight }, () => new Array(mapWidth).fill(false))
      data.collisions.forEach(({ x, y }) => {
        const col = Math.floor(x / tileSize)
        const row = Math.floor(y / tileSize)
        if (row >= 0 && row < mapHeight && col >= 0 && col < mapWidth)
          collisionLayer[row][col] = true
      })
    }
    if (Array.isArray(data.layers?.furniture)) objectsLayer = data.layers.furniture
    else if (Array.isArray(data.objects)) objectsLayer = data.objects  // backward compat
    if (data.tileset && data.tileset !== currentTileset) {
      await loadTileset(data.tileset)
      updateTilesetSelection(data.tileset)
    }
    setStatus(`Loaded maps/${mapName}.json`)
  } catch {
    setStatus('Could not load existing map')
  }
}

// ── Load assets for object placement ───────────────────────────────────
async function loadAssets() {
  try {
    const resp  = await fetch('/list-assets')
    const { files } = await resp.json()
    const furniturePicker = document.getElementById('furniture-picker')
    furniturePicker.innerHTML = ''
    for (const src of files) {
      // Preload image
      if (!assetImages[src]) {
        const img = new Image()
        img.src = '/assets/' + src
        assetImages[src] = img
      }
      // Only non-rooms assets become furniture cards
      if (src.startsWith('rooms/')) continue
      const card = document.createElement('div')
      card.className = 'tileset-card asset-thumb'
      card.dataset.src = src
      const cardImg = document.createElement('img')
      cardImg.src = '/assets/' + src
      const label = document.createElement('div')
      label.className = 'tileset-card-label'
      label.textContent = src.replace(/^[^/]+\//, '').replace(/\.[^.]+$/, '')
      card.appendChild(cardImg)
      card.appendChild(label)
      card.addEventListener('click', () => {
        document.querySelectorAll('.asset-thumb').forEach(t => t.classList.remove('selected'))
        card.classList.add('selected')
        selectedAsset = { src }
        setMode('object')
        renderObjectPreview(src)
      })
      furniturePicker.appendChild(card)
    }
  } catch { /* non-fatal */ }
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  document.title = `Maki — ${mapName} (${mapWidth}×${mapHeight} @ ${tileSize}px)`
  setMode(startMode)

  try {
    const resp = await fetch('/maki-config')
    const cfg  = await resp.json()
    gameWidth  = cfg.width  || 800
    gameHeight = cfg.height || 600
  } catch {
    setStatus('⚠ Could not read maki.config.js — using 800×600')
  }

  setZoom(1)

  try {
    await loadTileset()
  } catch {
    setStatus(`Could not load tileset: ${currentTileset}`)
  }

  await loadTilesetList()
  await loadAssets()

  if (loadExisting) await loadMap()

  renderMap()
}

init()
</script>
